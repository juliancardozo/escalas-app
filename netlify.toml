# Configuración de build para Netlify (también editable en Site settings → Build & deploy)
# Sitio estático: HTML/CSS/JS en la raíz del repo, sin bundler.

[build]
  # Sin compilación; Netlify solo publica los archivos. Equivale a dejar Build command vacío en la UI.
  command = "echo 'Static site — sin build'"
  publish = "."

# Coincide con Site settings → Build & deploy → Functions directory: netlify/functions
[functions]
  directory = "netlify/functions"

# Redirecciones internas (rewrite): la URL no cambia en el navegador.
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200

[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200
