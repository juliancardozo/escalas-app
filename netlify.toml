[build]
  command = "echo 'Static site — sin build'"
  publish = "."

[functions]
  directory = "netlify/functions"

# Landing como entrypoint principal del sitio
[[redirects]]
  from = "/"
  to = "/landing.html"
  status = 200
  force = true

# Alias semántico para abrir la landing también por /landing
[[redirects]]
  from = "/landing"
  to = "/landing.html"
  status = 200
  force = true

# Entrada clara a la app
[[redirects]]
  from = "/app"
  to = "/index.html"
  status = 200
  force = true

# Evita cache agresivo en HTML para que cada deploy levante la versión nueva
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
